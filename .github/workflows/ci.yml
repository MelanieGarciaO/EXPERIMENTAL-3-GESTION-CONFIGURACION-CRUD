name: CI/CD - Django Pipeline

on:
  push:
    branches: [ main, ci-setup ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── SESIÓN 1: Tests ───────────────────────────────────────────
  test:
    name: "Sesión 1 – CI: Tests Django"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: pruebatec
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: mmgo26
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_NAME: pruebatec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mmgo26
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Ejecutar migraciones
        run: python manage.py migrate

      - name: Ejecutar tests
        run: python manage.py test --verbosity=2

  # ─── SESIÓN 2 y 3: Build Docker + Artefacto ────────────────────
  build:
    name: "Sesión 2/3 – Build Docker y Artefacto"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: |
          docker build -t django-invborradologico:latest .
          docker build -t django-invborradologico:${{ github.sha }} .

      - name: Verificar imagen creada
        run: docker images | grep django-invborradologico

      - name: Validar docker-compose.yml
        run: docker compose config

      - name: Guardar imagen como artefacto
        run: |
          docker save django-invborradologico:latest | gzip > django-image.tar.gz

      - name: Subir artefacto a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: django-docker-image
          path: django-image.tar.gz
          retention-days: 7

      - name: Simular despliegue
        run: |
          echo "🚀 Simulando despliegue..."
          echo "Imagen: django-invborradologico:latest"
          echo "Commit: ${{ github.sha }}"
          echo "Rama: ${{ github.ref_name }}"
          echo "✅ Despliegue simulado exitosamente"